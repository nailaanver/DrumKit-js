<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="keys">
        <div class="key" data-key="65">
            <kbd>A</kbd>
            <span>Clap</span>
        </div>
        <div class="key" data-key="83">
            <kbd>S</kbd>
            <span>Hihat</span>
        </div>
        <div class="key" data-key="68">
            <kbd>D</kbd>
            <span>Kick</span>
        </div>
        <div class="key" data-key="70">
            <kbd>F</kbd>
            <span>Openhat</span>
        </div>
        <div class="key" data-key="71">
            <kbd>G</kbd>
            <span>Boom</span>
        </div>
        <div class="key" data-key="72">
            <kbd>H</kbd>
            <span>Ride</span>
        </div>
        <div class="key" data-key="74">
            <kbd>J</kbd>
            <span>Snare</span>
        </div>
        <div class="key" data-key="75">
            <kbd>K</kbd>
            <span>Tom</span>
        </div>
        <div class="key" data-key="76">
            <kbd>L</kbd>
            <span>Tink</span>
        </div>
    </div>

    <audio data-key="65" src="sounds/clap.wav"></audio>
    <audio data-key="83" src="sounds/hitat.wav"></audio>
    <audio data-key="68" src="sounds/kick.wav"></audio>
    <audio data-key="68" src="sounds/openhat.wav"></audio>
    <audio data-key="68" src="sounds/boom.wav"></audio>
    <audio data-key="68" src="sounds/ride.wav"></audio>
    <audio data-key="68" src="sounds/snare.wav"></audio>
    <audio data-key="68" src="sounds/tom.wav"></audio>
    <audio data-key="68" src="sounds/tink.wav"></audio>


    <script src="script.js"></script>

</body>
</html>
